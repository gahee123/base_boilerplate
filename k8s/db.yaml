apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: fastapi-boilerplate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: app_db
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: fastapi-boilerplate
spec:
  selector:
    app: db
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
