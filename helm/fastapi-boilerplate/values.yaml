replicaCount: 1

# Arq Worker Settings
worker:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

image:
  repository: fastapi-boilerplate
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 999

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

env:
  APP_ENV: production
  APP_DEBUG: "false"
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db-service:5432/app_db"
  REDIS_URL: "redis://redis-service:6379/0"
  # The secrets below should ideally be managed by ExternalSecrets or sealed-secrets in real prod
  # DB_USER: ""
  # DB_PASSWORD: ""
  # JWT_SECRET_KEY: ""

nodeSelector: {}
tolerations: []
affinity: {}
